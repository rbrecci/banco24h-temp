<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banco 24h — Fintech Informatica</title>

  <link rel="stylesheet" href="style.css" />

  <!-- jsPDF: necessario para banco.gerarPDF() -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

  <h1>Banco 24h</h1>

  <!--
    Mensagem de sistema: exibe erros de login e confirmacoes
    de estado (sessao encerrada, sistema carregado, etc.).
    Erros ficam aqui — nunca no log de atividades.
  -->
  <div id="msg-sistema">Carregando sistema...</div>

  <!-- ── SECAO LOGIN ───────────────────────────────────────── -->
  <div class="card" id="secao-login">
    <h3>Login</h3>

    <select id="select-banco">
      <option value="">Selecione o banco</option>
    </select>

    <input type="text"     id="input-cpf"   placeholder="CPF (ex: 111.111.111-11)" />
    <input type="password" id="input-senha" placeholder="Senha" />

    <button class="btn-primario" id="btn-login">Entrar</button>
  </div>

  <!-- ── SECAO PAINEL (pos-login) ─────────────────────────── -->
  <div class="card oculto" id="secao-painel">
    <div id="header-banco">—</div>
    <h3>Saldo Atual</h3>
    <div id="saldo-display">—</div>
  </div>

  <div class="card oculto" id="secao-acoes">
    <h3>Operacoes</h3>
    <div class="grid-acoes">
      <button class="btn-secundario" id="btn-saldo">Ver Saldo</button>
      <button class="btn-secundario" id="btn-saque">Sacar</button>
      <button class="btn-secundario" id="btn-deposito">Depositar</button>
      <button class="btn-secundario" id="btn-transferencia">Transferir</button>
      <button class="btn-secundario" id="btn-senha">Trocar Senha</button>
      <button class="btn-secundario" id="btn-extrato">Ver Extrato</button>
    </div>
    <hr class="separador" />
    <button class="btn-secundario" id="btn-pdf">Gerar PDF do Extrato</button>
    <button class="btn-perigo"     id="btn-logout">Sair</button>
  </div>

  <!-- ── LOG DE ATIVIDADES ─────────────────────────────────── -->
  <!--
    Exibe apenas operacoes realizadas com exito.
    Mantem ate 10 entradas. Nao e substituido — e acumulado.
  -->
  <p id="log-titulo" class="oculto">Atividades recentes</p>
  <ul id="log-lista">
    <li class="log-vazio">Nenhuma atividade registrada nesta sessao.</li>
  </ul>


  <script src="controller/bancoController.js"></script>

  <script>
    // ── Referencias ────────────────────────────────────────────
    const selectBanco  = document.getElementById('select-banco');
    const inputCPF     = document.getElementById('input-cpf');
    const inputSenha   = document.getElementById('input-senha');
    const secaoLogin   = document.getElementById('secao-login');
    const secaoPainel  = document.getElementById('secao-painel');
    const secaoAcoes   = document.getElementById('secao-acoes');
    const saldoDisplay = document.getElementById('saldo-display');
    const headerBanco  = document.getElementById('header-banco');
    const msgSistema   = document.getElementById('msg-sistema');
    const logTitulo    = document.getElementById('log-titulo');
    const logLista     = document.getElementById('log-lista');

    const MAX_LOG = 10; // numero maximo de entradas no log

    const banco = new BancoController();

    // ── Helpers de mensagem ────────────────────────────────────

    /**
     * Exibe uma mensagem acima do card de login.
     * @param {string}  texto
     * @param {boolean} isErro — true para estilo vermelho
     */
    function setMsg(texto, isErro = false) {
      msgSistema.textContent = texto;
      msgSistema.className   = isErro ? 'erro' : '';
    }

    // ── Helpers de log ─────────────────────────────────────────

    /**
     * Adiciona uma entrada ao log de atividades bem-sucedidas.
     * Mantem no maximo MAX_LOG itens, removendo o mais antigo se necessario.
     * @param {string} mensagem
     */
    function logOk(mensagem) {
      // Remove o item "vazio" se ainda existir
      const vazio = logLista.querySelector('.log-vazio');
      if (vazio) vazio.remove();

      // Mostra o titulo do log
      logTitulo.classList.remove('oculto');

      // Cria o novo item
      const li   = document.createElement('li');
      const hora = document.createElement('span');
      const txt  = document.createElement('span');

      hora.className   = 'log-hora';
      hora.textContent = new Date().toLocaleTimeString('pt-br');

      txt.className   = 'log-texto';
      txt.textContent = mensagem;

      li.appendChild(hora);
      li.appendChild(txt);

      // Insere no topo (atividade mais recente aparece primeiro)
      logLista.insertBefore(li, logLista.firstChild);

      // Remove o item mais antigo se ultrapassar o limite
      while (logLista.children.length > MAX_LOG) {
        logLista.removeChild(logLista.lastChild);
      }
    }

    // ── Helpers de interface ───────────────────────────────────

    function atualizarSaldo() {
      saldoDisplay.textContent = banco.getSaldo().saldoFormatado;
    }

    function mostrarPainel(bancoDados) {
      secaoLogin.classList.add('oculto');
      secaoPainel.classList.remove('oculto');
      secaoAcoes.classList.remove('oculto');
      headerBanco.textContent = bancoDados.nome;
      atualizarSaldo();
    }

    function mostrarLogin() {
      secaoLogin.classList.remove('oculto');
      secaoPainel.classList.add('oculto');
      secaoAcoes.classList.add('oculto');
      saldoDisplay.textContent = '—';
      headerBanco.textContent  = '—';
      inputCPF.value   = '';
      inputSenha.value = '';
    }

    // ── Inicializacao ──────────────────────────────────────────
    (async () => {
      await banco.init();

      banco.getBancos().forEach(b => {
        const opt       = document.createElement('option');
        opt.value       = b.id;
        opt.textContent = b.nome;
        selectBanco.appendChild(opt);
      });

      setMsg('Sistema carregado. Selecione um banco e faca login.');
    })();

    // ── Login ──────────────────────────────────────────────────
    document.getElementById('btn-login').addEventListener('click', () => {
      const cpf   = inputCPF.value;
      const senha = inputSenha.value;

      if (!selectBanco.value) { setMsg('Selecione um banco.', true); return; }
      if (!cpf || !senha)     { setMsg('Preencha o CPF e a senha.', true); return; }

      const resultado = banco.login(cpf, senha);

      if (resultado.ok) {
        setMsg(resultado.mensagem, false);
        mostrarPainel(resultado.banco);
        logOk(`Login realizado: ${resultado.banco.nome}`);
      } else {
        // Erros de login ficam apenas na msg-sistema, nao no log
        setMsg(resultado.mensagem, true);
      }
    });

    // ── Logout ─────────────────────────────────────────────────
    document.getElementById('btn-logout').addEventListener('click', () => {
      banco.logout();
      mostrarLogin();
      setMsg('Sessao encerrada.', false);
    });

    // ── Ver Saldo ──────────────────────────────────────────────
    document.getElementById('btn-saldo').addEventListener('click', () => {
      const { saldoFormatado } = banco.getSaldo();
      atualizarSaldo();
      logOk(`Consulta de saldo: ${saldoFormatado}`);
    });

    // ── Saque ──────────────────────────────────────────────────
    document.getElementById('btn-saque').addEventListener('click', () => {
      const resultado = banco.sacar();
      if (resultado.ok) {
        atualizarSaldo();
        logOk(resultado.mensagem);
      } else {
        setMsg(resultado.mensagem, true);
      }
    });

    // ── Deposito ───────────────────────────────────────────────
    document.getElementById('btn-deposito').addEventListener('click', () => {
      const resultado = banco.depositar();
      if (resultado.ok) {
        atualizarSaldo();
        logOk(resultado.mensagem);
      } else {
        setMsg(resultado.mensagem, true);
      }
    });

    // ── Transferencia ──────────────────────────────────────────
    document.getElementById('btn-transferencia').addEventListener('click', () => {
      const resultado = banco.transferir();
      if (resultado.ok) {
        atualizarSaldo();
        logOk(resultado.mensagem);
      } else {
        setMsg(resultado.mensagem, true);
      }
    });

    // ── Troca de Senha ─────────────────────────────────────────
    document.getElementById('btn-senha').addEventListener('click', () => {
      const resultado = banco.trocarSenha();
      if (resultado.ok) {
        logOk(resultado.mensagem);
      } else {
        setMsg(resultado.mensagem, true);
      }
    });

    // ── Extrato ────────────────────────────────────────────────
    document.getElementById('btn-extrato').addEventListener('click', () => {
      const historico = banco.getExtrato();
      banco.exibirExtrato(); // imprime no console do navegador

      if (historico.length === 0) {
        setMsg('Extrato vazio. Nenhuma transacao registrada ainda.', false);
        return;
      }

      // Monta o texto do extrato e exibe via alert para nao poluir o log
      const linhas = historico.map((t, i) => {
        const valor = t.valorFormatado ? ` ${t.valorFormatado}` : '';
        const obs   = t.obs ? ` (${t.obs})` : '';
        return `${i + 1}. [${t.dataHora}] ${t.tipo}${obs}${valor} — Saldo: ${t.saldoAposFormatado}`;
      }).join('\n');

      alert(`Extrato — ${historico.length} transacao(oes):\n\n${linhas}`);
      logOk(`Extrato consultado (${historico.length} transacao(oes))`);
    });

    // ── Gerar PDF ──────────────────────────────────────────────
    document.getElementById('btn-pdf').addEventListener('click', () => {
      const resultado = banco.gerarPDF();
      if (resultado.ok) {
        logOk(resultado.mensagem);
      } else {
        setMsg(resultado.mensagem, true);
      }
    });
  </script>

</body>
</html>
